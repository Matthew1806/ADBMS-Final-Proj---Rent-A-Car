{% extends 'base.html' %}

{% block title %}Verify Email - Rent A Car{% endblock %}

{% block content %}
<section class="auth-container">
    <div class="auth-card">
        <!-- Header Section -->
        <div class="auth-header">
            <div class="auth-icon-wrapper">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1 class="auth-title">Verify Your Email</h1>
            <p class="auth-subtitle">Enter the 6-digit code sent to {{ email }}</p>
        </div>

        <!-- OTP Form -->
        <form method="post" class="auth-form" id="otpForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="form-group">
                <label for="otp" class="form-label">
                    <span class="form-label-text">Verification Code</span>
                    <span class="form-required">*</span>
                </label>
                <div class="form-input-wrapper">
                    <i class="fas fa-key"></i>
                    <input 
                        type="text" 
                        id="otp" 
                        name="otp" 
                        class="form-input" 
                        placeholder="000000" 
                        maxlength="6" 
                        inputmode="numeric"
                        required
                        pattern="[0-9]{6}"
                        autocomplete="off"
                    >
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">Verify Email</button>
        </form>

        <!-- Resend Link -->
        <div style="margin-top: 20px; text-align: center;">
            <p style="color: #666; font-size: 14px;">Didn't receive the code?</p>
            <form method="post" action="{{ url_for('resend_otp') }}" style="display: inline;">
                <input type="hidden" name="email" value="{{ email }}">
                <button type="submit" class="btn btn-secondary" style="font-size: 14px;">Resend Code</button>
            </form>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">Code expires in 15 minutes</p>
        </div>

        <!-- Back to Register -->
        <div class="auth-footer">
            <p class="auth-footer-text">
                Want to try a different email?
                <a href="{{ url_for('register') }}" class="auth-link">Back to Register</a>
            </p>
        </div>
    </div>
</section>

<script>
    // Numeric input only
    document.getElementById('otp').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>
{% endblock %}
